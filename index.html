<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2e1a">
<title>TrawnikPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1f0f;
    --surface: #162516;
    --surface2: #1e321e;
    --surface3: #254025;
    --green: #4caf50;
    --green-light: #81c784;
    --green-pale: #c8e6c9;
    --amber: #ffb300;
    --amber-light: #ffe082;
    --red: #ef5350;
    --text: #e8f5e9;
    --text-muted: #81a881;
    --border: #2a3d2a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a3a1a 0%, #0d2b0d 100%);
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .app-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--green-light);
    letter-spacing: -0.5px;
  }
  .app-title span { color: var(--amber); }
  .header-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* NAV */
  .nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: #0d1f0d;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 4px 10px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-family: 'Nunito', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--green-light); }
  .nav-btn .icon { font-size: 20px; }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--green-light);
  }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 20px 0 8px;
  }

  /* INPUTS */
  .form-group { margin-bottom: 12px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--green);
  }
  .form-select option { background: var(--surface2); }
  .form-textarea { resize: none; height: 72px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 18px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--green); color: #0f1f0f; }
  .btn-secondary { background: var(--surface3); color: var(--text); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-amber { background: var(--amber); color: #1a1000; }
  .btn-full { width: 100%; justify-content: center; }
  .btn:hover { opacity: 0.88; }

  /* LOG ENTRIES */
  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .log-entry-left { flex: 1; }
  .log-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .log-fertilizer {
    font-weight: 800;
    font-size: 15px;
    color: var(--text);
  }
  .log-details {
    font-size: 13px;
    color: var(--green-light);
    margin-top: 2px;
  }
  .log-notes {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-style: italic;
  }
  .log-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    flex-shrink: 0;
  }
  .log-delete:hover { color: var(--red); }

  /* CALENDAR */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-top: 10px;
  }
  .cal-day-name {
    text-align: center;
    font-size: 10px;
    font-weight: 800;
    color: var(--text-muted);
    padding: 4px 0;
    letter-spacing: 0.5px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
  }
  .cal-day.empty { cursor: default; }
  .cal-day.today { background: var(--surface3); color: var(--green-light); }
  .cal-day.has-log { background: var(--green); color: #0f1f0f; }
  .cal-day.has-plan { background: var(--amber); color: #1a1000; }
  .cal-day.has-both {
    background: linear-gradient(135deg, var(--green) 50%, var(--amber) 50%);
    color: #0f1f0f;
  }
  .cal-day.past-plan { background: var(--surface3); color: var(--red); border: 1px solid var(--red); }
  .cal-day:not(.empty):hover { opacity: 0.8; }

  .cal-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .cal-month {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--green-light);
  }
  .cal-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  /* PLAN ENTRIES */
  .plan-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .plan-entry.done { border-left-color: var(--green); opacity: 0.7; }
  .plan-entry.overdue { border-left-color: var(--red); }
  .plan-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .plan-fert { font-weight: 800; font-size: 15px; }
  .plan-dose { font-size: 13px; color: var(--amber-light); margin-top: 2px; }
  .plan-status {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .plan-status.upcoming { background: #1a2e00; color: var(--green-light); }
  .plan-status.overdue { background: #2e0a00; color: var(--red); }
  .plan-status.done-badge { background: var(--surface3); color: var(--text-muted); }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
  }
  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--green-light);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* BAR CHART */
  .bar-chart { margin-top: 10px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .bar-label { font-size: 12px; color: var(--text-muted); width: 100px; flex-shrink: 0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track {
    flex: 1;
    height: 14px;
    background: var(--surface2);
    border-radius: 7px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, var(--green-light) 100%);
    border-radius: 7px;
    transition: width 0.5s ease;
  }
  .bar-count { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; width: 20px; text-align: right; flex-shrink: 0; }

  /* MONTHLY USAGE */
  .month-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 80px;
    margin-top: 12px;
    margin-bottom: 6px;
  }
  .month-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .month-bar {
    width: 100%;
    background: var(--green);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    transition: height 0.4s ease;
  }
  .month-bar-label { font-size: 9px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 10px; }
  .empty-text { font-size: 15px; font-weight: 600; }
  .empty-sub { font-size: 13px; margin-top: 4px; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--green-light);
    margin-bottom: 16px;
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #0f1f0f;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: 800;
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* CHIP */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }
  .chip-green { background: #1a3a1a; color: var(--green-light); }
  .chip-amber { background: #2e2000; color: var(--amber-light); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Trawnik<span>Pro</span></div>
    <div class="header-date" id="headerDate"></div>
  </div>
</div>

<!-- PAGES -->
<div class="page active" id="page-calendar">
  <div class="card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Nawożenie</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Planowane</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red); border:1px solid var(--red)"></div>Zaległe</div>
    </div>
  </div>

  <div class="section-label">Plan nawożeń</div>
  <div class="card" style="padding-bottom:10px">
    <div class="card-title" style="margin-bottom:12px">Dodaj zaplanowane</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" class="form-input" id="planDate">
      </div>
      <div class="form-group">
        <label class="form-label">Nawóz</label>
        <input type="text" class="form-input" id="planFert" placeholder="np. Mocznik" list="fertList">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dawka (g)</label>
        <input type="number" class="form-input" id="planDose" placeholder="np. 700" min="0" step="1">
      </div>
      <div class="form-group">
        <label class="form-label">Ilość wody (l)</label>
        <input type="number" class="form-input" id="planArea" placeholder="np. 10" min="0" step="0.5">
      </div>
    </div>
    <button class="btn btn-amber btn-full" onclick="addPlan()">📅 Dodaj do planu</button>
  </div>

  <div class="section-label">Nadchodzące</div>
  <div id="planList"></div>
</div>

<div class="page" id="page-log">
  <div class="section-label">Historia nawożeń</div>
  <div id="logList"></div>
  <datalist id="fertList">
    <option value="Substral Trawnik">
    <option value="Florovit Trawnik">
    <option value="Target Trawnik">
    <option value="Compo Rasendünger">
    <option value="Wolf Garten">
    <option value="Bio-nawóz organiczny">
    <option value="Mocznik (RSM)">
    <option value="Saletra amonowa">
  </datalist>
</div>

<div class="page" id="page-stats">
  <div class="section-label">Podsumowanie</div>
  <div class="stats-grid" id="statsGrid"></div>

  <div class="section-label">Aktywność miesięczna</div>
  <div class="card">
    <div class="card-title">Nawożenia w roku</div>
    <div class="month-bars" id="monthBars"></div>
    <div style="display:flex; gap:4px;" id="monthLabels"></div>
  </div>

  <div class="section-label">Najczęstsze nawozy</div>
  <div class="card">
    <div class="bar-chart" id="fertChart"></div>
  </div>
</div>

<!-- QUICK ACTION MODAL -->
<div class="modal-overlay" id="dayModal">
  <div class="modal" id="dayModalInner">
    <div class="modal-title" id="modalTitle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-weight:800;font-size:16px" id="modalFertName"></div>
      <button class="log-delete" style="color:var(--green-light);font-size:18px;touch-action:manipulation" id="modalEditBtn">✏️</button>
    </div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px" id="modalDose"></div>
    <div id="modalBtnGrid">
      <button data-status="done"    style="width:100%;margin-bottom:8px;padding:14px;border:none;border-radius:10px;cursor:pointer;font-family:Nunito,sans-serif;font-weight:800;font-size:14px;touch-action:manipulation;display:block">✅ Wykonano</button>
      <button data-status="planned" style="width:100%;margin-bottom:8px;padding:14px;border:none;border-radius:10px;cursor:pointer;font-family:Nunito,sans-serif;font-weight:800;font-size:14px;touch-action:manipulation;display:block">📅 Planowane</button>
      <button data-status="overdue" style="width:100%;margin-bottom:8px;padding:14px;border:none;border-radius:10px;cursor:pointer;font-family:Nunito,sans-serif;font-weight:800;font-size:14px;touch-action:manipulation;display:block">⚠️ Zaległe</button>
      <a id="modalGcalBtn" target="_blank" style="display:block;text-align:center;padding:10px;border-radius:10px;background:var(--surface3);color:var(--text-muted);text-decoration:none;font-weight:800;font-size:12px;margin-top:4px">📆 Dodaj do Google Calendar</a>
    </div>
    <div id="modalEmpty" style="display:none;text-align:center;padding:20px 0;color:var(--text-muted)">
      <div style="font-size:32px;margin-bottom:8px">🌿</div>
      <div style="font-weight:600">Brak wpisów w tym dniu</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" style="touch-action:manipulation" onclick="document.getElementById('dayModal').classList.remove('open')">Zamknij</button>
    </div>
  </div>
</div>

<!-- EDIT LOG MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ Edytuj nawożenie</div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label">Data</label>
      <input type="date" class="form-input" id="editDate">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nawóz</label>
        <input type="text" class="form-input" id="editFert" list="fertList">
      </div>
      <div class="form-group">
        <label class="form-label">Dawka (g)</label>
        <input type="number" class="form-input" id="editDose" min="0" step="1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Ilość wody (l)</label>
      <input type="number" class="form-input" id="editArea" min="0" step="0.5">
    </div>
    <div class="form-group">
      <label class="form-label">Notatka</label>
      <textarea class="form-textarea" id="editNote"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="saveEditLog()">💾 Zapisz</button>
      <button class="btn btn-secondary" onclick="document.getElementById('editModal').classList.remove('open')">Anuluj</button>
    </div>
  </div>
</div>

<!-- EDIT PLAN MODAL -->
<div class="modal-overlay" id="editPlanModal">
  <div class="modal">
    <div class="modal-title">✏️ Edytuj plan</div>
    <input type="hidden" id="editPlanId">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" class="form-input" id="editPlanDate">
      </div>
      <div class="form-group">
        <label class="form-label">Nawóz</label>
        <input type="text" class="form-input" id="editPlanFert" list="fertList">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dawka (g)</label>
        <input type="number" class="form-input" id="editPlanDose" min="0" step="1">
      </div>
      <div class="form-group">
        <label class="form-label">Ilość wody (l)</label>
        <input type="number" class="form-input" id="editPlanArea" min="0" step="0.5">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="saveEditPlan()">💾 Zapisz</button>
      <button class="btn btn-secondary" onclick="document.getElementById('editPlanModal').classList.remove('open')">Anuluj</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('calendar', this)">
    <span class="icon">📅</span>Kalendarz
  </button>
  <button class="nav-btn" onclick="switchPage('log', this)">
    <span class="icon">🌿</span>Historia
  </button>
  <button class="nav-btn" onclick="switchPage('stats', this)">
    <span class="icon">📊</span>Statystyki
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────
let state = { logs:[], plans:[], calYear:new Date().getFullYear(), calMonth:new Date().getMonth() };
let _currentModalDate = null; // przechowuje datę aktualnie otwartego modalu

// ─── STORAGE ─────────────────────────────────────────────────
function save(){ try{ localStorage.setItem('tp', JSON.stringify({logs:state.logs,plans:state.plans})); }catch(e){} }
function load(){ try{ const d=JSON.parse(localStorage.getItem('tp')||'{}'); state.logs=d.logs||[]; state.plans=d.plans||[]; }catch(e){} }
function sid(a,b){ return String(a)===String(b); }

// ─── UTILS ───────────────────────────────────────────────────
function uid(){ return Date.now()+Math.floor(Math.random()*9999); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){
  if(!d)return'';
  const[y,m,day]=d.split('-');
  return `${day} ${['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'][+m-1]} ${y}`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=err?'var(--red)':'var(--green)';
  t.style.color=err?'#fff':'#0f1f0f';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── PRELOADED ───────────────────────────────────────────────
const PRELOADED = [
  {id:20260001,date:'2026-06-02',fert:'Mocznik',       dose:700, area:10},
  {id:20260002,date:'2026-06-16',fert:'Mocznik',       dose:700, area:10},
  {id:20260003,date:'2026-06-30',fert:'Mocznik',       dose:700, area:10},
  {id:20260004,date:'2026-07-14',fert:'Biopon',        dose:300, area:10},
  {id:20260005,date:'2026-07-28',fert:'Mocznik',       dose:700, area:10},
  {id:20260006,date:'2026-08-11',fert:'Mocznik',       dose:700, area:10},
  {id:20260007,date:'2026-08-25',fert:'Mocznik',       dose:700, area:10},
  {id:20260008,date:'2026-09-01',fert:'Nawóz jesienny',dose:null,area:null}
];

// ─── INIT ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  load();
  const td = today();
  const existIds = new Set(state.plans.map(p=>String(p.id)));
  PRELOADED.forEach(p=>{
    if(!existIds.has(String(p.id)))
      state.plans.push({...p, status:p.date<td?'overdue':'planned', note:''});
  });
  state.plans.sort((a,b)=>a.date.localeCompare(b.date));
  save();

  document.getElementById('planDate').value = td;
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('pl-PL',{weekday:'short',day:'numeric',month:'short'});

  // Napraw pola numeryczne — kursor na końcu
  document.querySelectorAll('input[type=number]').forEach(el=>{
    el.setAttribute('inputmode','decimal');
    el.addEventListener('focus', function(){
      const v=this.value; this.value=''; this.value=v;
    });
  });

  // Zamknij po kliknięciu w tło + delegacja przycisków statusu na overlay
  // KLUCZOWE: listener na overlay nigdy nie jest przebudowywany
  document.getElementById('dayModal').addEventListener('click', function(e){
    // Zamknij po kliknięciu w tło
    if(e.target === this){ this.classList.remove('open'); return; }
    // Delegacja statusu — szukaj przycisku z data-status w górę drzewa
    const btn = e.target.closest('[data-status]');
    if(btn && btn.dataset.status){
      e.stopPropagation();
      _changePlanStatus(btn.dataset.status);
      return;
    }
    // Delegacja edycji
    if(e.target.closest('#modalEditBtn')){
      const p = state.plans.find(x=>x.date===_currentModalDate);
      if(p) openEditPlan(p.id);
    }
  });
  document.getElementById('editModal').addEventListener('click', function(e){
    if(e.target===this) this.classList.remove('open');
  });
  document.getElementById('editPlanModal').addEventListener('click', function(e){
    if(e.target===this) this.classList.remove('open');
  });

  // touch-action: manipulation — eliminuje 300ms delay na mobile
  const s = document.createElement('style');
  s.textContent = '* { touch-action: manipulation; }';
  document.head.appendChild(s);

  renderAll();
});

// ─── PAGES ───────────────────────────────────────────────────
function switchPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  renderAll();
}

function renderAll(){ renderLog(); renderCalendar(); renderPlan(); renderStats(); }

// ─── DAY MODAL ──────────────────────────────────────────────
function gcalUrl(p){
  if(!p||!p.date) return '#';
  const d = p.date.replace(/-/g,'');
  const title = encodeURIComponent('Nawożenie: '+p.fert);
  const details = encodeURIComponent((p.dose?'Dawka: '+p.dose+' g\n':'')+(p.area?'Woda: '+p.area+' l':''));
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${d}/${d}&details=${details}&sf=true&output=xml`;
}

// Wywoływane przez delegację na overlay — NIGDY bezpośrednio przez onclick
function _changePlanStatus(newStatus){
  if(!_currentModalDate) return;
  setPlanStatus(_currentModalDate, newStatus);
}

// Aktualizuje kolory przycisków bez przebudowy DOM
function updateModalStatus(s){
  const btns = document.querySelectorAll('#modalBtnGrid [data-status]');
  btns.forEach(btn => {
    const bs = btn.dataset.status;
    if(bs === 'done'){
      btn.style.background = s==='done' ? 'var(--green)' : 'var(--surface2)';
      btn.style.color      = s==='done' ? '#0f1f0f'      : 'var(--text-muted)';
    } else if(bs === 'planned'){
      btn.style.background = s==='planned' ? 'var(--amber)' : 'var(--surface2)';
      btn.style.color      = s==='planned' ? '#1a1000'      : 'var(--text-muted)';
    } else if(bs === 'overdue'){
      btn.style.background = s==='overdue' ? 'var(--red)' : 'var(--surface2)';
      btn.style.color      = s==='overdue' ? '#fff'       : 'var(--text-muted)';
    }
    btn.textContent = (bs==='done'?'✅ Wykonano':bs==='planned'?'📅 Planowane':'⚠️ Zaległe') + (bs===s?' ✓':'');
  });
}

function openDayModal(dateStr){
  _currentModalDate = dateStr;
  const plan = state.plans.find(p=>p.date===dateStr);
  const hasPlan = !!plan;

  document.getElementById('modalTitle').textContent = '📅 ' + fmtDate(dateStr);
  document.getElementById('modalFertName').textContent  = hasPlan ? plan.fert : '';
  document.getElementById('modalDose').textContent = hasPlan ? [plan.dose?`⚖️ ${plan.dose} g`:'', plan.area?`💧 ${plan.area} l`:''].filter(Boolean).join(' · ') : '';
  document.getElementById('modalBtnGrid').style.display  = hasPlan ? 'block' : 'none';
  document.getElementById('modalEditBtn').style.display  = hasPlan ? 'inline-block' : 'none';
  document.getElementById('modalFertName').style.display = hasPlan ? 'block' : 'none';
  document.getElementById('modalDose').style.display     = hasPlan ? 'block' : 'none';
  document.getElementById('modalEmpty').style.display    = hasPlan ? 'none' : 'block';

  if(hasPlan){
    updateModalStatus(plan.status || 'planned');
    document.getElementById('modalGcalBtn').href = gcalUrl(plan);
  }
  document.getElementById('dayModal').classList.add('open');
}

// ─── PLAN STATUS ─────────────────────────────────────────────
// Przyjmuje DATE (nie ID) — szuka planu po dacie modalu
function setPlanStatus(dateStr, newStatus){
  const plan = state.plans.find(p=>p.date===dateStr);
  if(!plan){ toast('Błąd: plan nie znaleziony', true); return; }

  const oldStatus = plan.status || 'planned';
  plan.status = newStatus;

  if(newStatus === 'done'){
    if(!state.logs.find(l=>sid(l.planId, plan.id))){
      state.logs.unshift({
        id:uid(), date:plan.date, fert:plan.fert,
        dose:plan.dose, area:plan.area, note:'', planId:plan.id
      });
      state.logs.sort((a,b)=>b.date.localeCompare(a.date));
    }
  } else if(oldStatus === 'done'){
    state.logs = state.logs.filter(l=>!(sid(l.planId, plan.id) && !l.note));
  }

  save();
  // Zaktualizuj TYLKO kolory przycisków modalu — bez przebudowy DOM!
  updateModalStatus(newStatus);
  // Zaktualizuj resztę widoku
  renderLog();
  renderCalendar();
  renderPlan();
  renderStats();
  toast(newStatus==='done'?'✅ Wykonano':newStatus==='overdue'?'⚠️ Zaległe':'📅 Planowane');
}

// ─── LOG ─────────────────────────────────────────────────────
function addLog(){
  const date=document.getElementById('logDate').value;
  const fert=document.getElementById('logFert').value.trim();
  const dose=parseFloat(document.getElementById('logDose').value);
  const area=parseFloat(document.getElementById('logArea').value);
  const note=document.getElementById('logNote').value.trim();
  if(!date||!fert){toast('Uzupełnij datę i nawóz',true);return;}
  state.logs.unshift({id:uid(),date,fert,dose:isNaN(dose)?null:dose,area:isNaN(area)?null:area,note});
  state.logs.sort((a,b)=>b.date.localeCompare(a.date));
  save();
  ['logFert','logDose','logArea','logNote'].forEach(id=>document.getElementById(id).value='');
  renderAll(); toast('✓ Nawożenie zapisane!');
}

function deleteLog(id){
  const log=state.logs.find(l=>sid(l.id,id));
  if(log?.planId){ const p=state.plans.find(p=>sid(p.id,log.planId)); if(p&&p.status==='done') p.status='planned'; }
  state.logs=state.logs.filter(l=>!sid(l.id,id));
  save(); renderAll(); toast('Usunięto wpis');
}

function openEditLog(id){
  const l=state.logs.find(l=>sid(l.id,id)); if(!l)return;
  document.getElementById('editId').value   = String(id);
  document.getElementById('editDate').value = l.date;
  document.getElementById('editFert').value = l.fert;
  document.getElementById('editDose').value = l.dose??'';
  document.getElementById('editArea').value = l.area??'';
  document.getElementById('editNote').value = l.note||'';
  document.getElementById('editModal').classList.add('open');
  document.getElementById('dayModal').classList.remove('open');
}

function saveEditLog(){
  const id=document.getElementById('editId').value;
  const l=state.logs.find(l=>sid(l.id,id)); if(!l)return;
  const date=document.getElementById('editDate').value;
  const fert=document.getElementById('editFert').value.trim();
  if(!date||!fert){toast('Uzupełnij datę i nawóz',true);return;}
  const dose=parseFloat(document.getElementById('editDose').value);
  const area=parseFloat(document.getElementById('editArea').value);
  l.date=date; l.fert=fert;
  l.dose=isNaN(dose)?null:dose;
  l.area=isNaN(area)?null:area;
  l.note=document.getElementById('editNote').value.trim();
  if(l.planId){
    const p=state.plans.find(p=>sid(p.id,l.planId));
    if(p){p.date=date;p.fert=fert;p.dose=l.dose;p.area=l.area;}
  }
  state.logs.sort((a,b)=>b.date.localeCompare(a.date));
  state.plans.sort((a,b)=>a.date.localeCompare(b.date));
  save();
  document.getElementById('editModal').classList.remove('open');
  renderAll(); toast('✏️ Wpis zaktualizowany!');
}

function renderLog(){
  const el=document.getElementById('logList');
  if(!state.logs.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-text">Brak wpisów</div><div class="empty-sub">Dodaj pierwsze nawożenie powyżej</div></div>`;
    return;
  }
  el.innerHTML=state.logs.map(l=>`
    <div class="log-entry">
      <div class="log-entry-left">
        <div class="log-date">📅 ${fmtDate(l.date)}</div>
        <div class="log-fertilizer">${esc(l.fert)}</div>
        <div class="log-details">${l.dose?`⚖️ ${l.dose} g`:''}${l.dose&&l.area?' · ':''}${l.area?`💧 ${l.area} l`:''}</div>
        ${l.note?`<div class="log-notes">${esc(l.note)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <button class="log-delete" style="color:var(--green-light)" onclick="openEditLog(${l.id})">✏️</button>
        <button class="log-delete" onclick="deleteLog(${l.id})">🗑</button>
      </div>
    </div>`).join('');
}

// ─── PLAN ────────────────────────────────────────────────────
function addPlan(){
  const date=document.getElementById('planDate').value;
  const fert=document.getElementById('planFert').value.trim();
  const dose=parseFloat(document.getElementById('planDose').value);
  const area=parseFloat(document.getElementById('planArea').value);
  if(!date||!fert){toast('Uzupełnij datę i nawóz',true);return;}
  state.plans.push({id:uid(),date,fert,dose:isNaN(dose)?null:dose,area:isNaN(area)?null:area,status:'planned',note:''});
  state.plans.sort((a,b)=>a.date.localeCompare(b.date));
  save();
  document.getElementById('planFert').value='';
  document.getElementById('planDose').value='';
  document.getElementById('planArea').value='';
  renderAll(); toast('📅 Dodano do planu!');
}

function deletePlan(id){
  state.logs=state.logs.filter(l=>!sid(l.planId,id));
  state.plans=state.plans.filter(p=>!sid(p.id,id));
  save(); renderAll();
}

function setPlanStatusFromList(id, newStatus){
  // Wywoływane z listy planu (bez modalu)
  const plan=state.plans.find(p=>sid(p.id,id));
  if(!plan)return;
  const oldStatus=plan.status||'planned';
  plan.status=newStatus;
  if(newStatus==='done'){
    if(!state.logs.find(l=>sid(l.planId,plan.id))){
      state.logs.unshift({id:uid(),date:plan.date,fert:plan.fert,dose:plan.dose,area:plan.area,note:'',planId:plan.id});
      state.logs.sort((a,b)=>b.date.localeCompare(a.date));
    }
  } else if(oldStatus==='done'){
    state.logs=state.logs.filter(l=>!(sid(l.planId,plan.id)&&!l.note));
  }
  save(); renderAll();
  toast(newStatus==='done'?'✅ Wykonano':newStatus==='overdue'?'⚠️ Zaległe':'📅 Planowane');
}

function openEditPlan(id){
  const p=state.plans.find(p=>sid(p.id,id)); if(!p)return;
  document.getElementById('editPlanId').value   = String(id);
  document.getElementById('editPlanDate').value = p.date;
  document.getElementById('editPlanFert').value = p.fert;
  document.getElementById('editPlanDose').value = p.dose??'';
  document.getElementById('editPlanArea').value = p.area??'';
  document.getElementById('editPlanModal').classList.add('open');
  document.getElementById('dayModal').classList.remove('open');
}

function saveEditPlan(){
  const id=document.getElementById('editPlanId').value;
  const plan=state.plans.find(p=>sid(p.id,id)); if(!plan)return;
  const date=document.getElementById('editPlanDate').value;
  const fert=document.getElementById('editPlanFert').value.trim();
  if(!date||!fert){toast('Uzupełnij datę i nawóz',true);return;}
  const dose=parseFloat(document.getElementById('editPlanDose').value);
  const area=parseFloat(document.getElementById('editPlanArea').value);
  plan.date=date; plan.fert=fert;
  plan.dose=isNaN(dose)?null:dose;
  plan.area=isNaN(area)?null:area;
  const linked=state.logs.find(l=>sid(l.planId,id));
  if(linked){linked.date=date;linked.fert=fert;linked.dose=plan.dose;linked.area=plan.area;}
  state.plans.sort((a,b)=>a.date.localeCompare(b.date));
  state.logs.sort((a,b)=>b.date.localeCompare(a.date));
  save();
  document.getElementById('editPlanModal').classList.remove('open');
  renderAll(); toast('✏️ Plan zaktualizowany!');
}

function renderPlan(){
  const el=document.getElementById('planList');
  const active=state.plans.filter(p=>p.status!=='done');
  if(!active.length){
    el.innerHTML=state.plans.length
      ?`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">Wszystko wykonane!</div></div>`
      :`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Brak planu</div></div>`;
    return;
  }
  el.innerHTML=active.map(p=>{
    const s=p.status||'planned';
    const badge=s==='overdue'
      ?`<span class="plan-status overdue">Zaległe</span>`
      :`<span class="plan-status upcoming">Planowane</span>`;
    const bS=`border:none;border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:14px;`;
    return `<div class="plan-entry ${s==='overdue'?'overdue':''}">
      <div>
        <div class="plan-date">📅 ${fmtDate(p.date)}</div>
        <div class="plan-fert">${esc(p.fert)}</div>
        ${p.dose?`<div class="plan-dose">⚖️ ${p.dose} g${p.area?' · 💧'+p.area+' l':''}</div>`:''}
        ${!p.dose&&p.area?`<div class="plan-dose">💧 ${p.area} l</div>`:''}
        <a href="${gcalUrl(p)}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-weight:800;color:var(--text-muted);text-decoration:none;background:var(--surface3);padding:4px 8px;border-radius:6px">📆 Google Calendar</a>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        ${badge}
        <div style="display:flex;gap:4px;margin-top:2px">
          <button style="${bS}background:${s==='done'   ?'var(--green)':'var(--surface3)'}" onclick="setPlanStatusFromList(${p.id},'done')">✅</button>
          <button style="${bS}background:${s==='planned'?'var(--amber)':'var(--surface3)'}" onclick="setPlanStatusFromList(${p.id},'planned')">📅</button>
          <button style="${bS}background:${s==='overdue'?'var(--red)'  :'var(--surface3)'}" onclick="setPlanStatusFromList(${p.id},'overdue')">⚠️</button>
          <button class="log-delete" style="color:var(--green-light)" onclick="openEditPlan(${p.id})">✏️</button>
          <button class="log-delete" onclick="deletePlan(${p.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── CALENDAR ────────────────────────────────────────────────
function changeMonth(dir){
  state.calMonth+=dir;
  if(state.calMonth>11){state.calMonth=0;state.calYear++;}
  if(state.calMonth<0) {state.calMonth=11;state.calYear--;}
  renderCalendar();
}

function renderCalendar(){
  const y=state.calYear, m=state.calMonth;
  document.getElementById('calMonthLabel').textContent =
    ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'][m]+' '+y;

  const planMap={};
  state.plans.forEach(p=>{ const s=p.status||'planned'; if(!planMap[p.date]||s==='done') planMap[p.date]=s; });

  const td=today();
  const offset=(new Date(y,m,1).getDay()+6)%7;
  const days=new Date(y,m+1,0).getDate();

  let html=['Pn','Wt','Śr','Cz','Pt','So','Nd'].map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for(let i=0;i<offset;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const s=planMap[ds];
    let cls='cal-day';
    if     (s==='done')    cls+=' has-log';
    else if(s==='overdue') cls+=' past-plan';
    else if(s==='planned') cls+=' has-plan';
    else if(ds===td)       cls+=' today';
    html+=`<div class="${cls}"${s?` onclick="openDayModal('${ds}')"`:''} style="${s?'cursor:pointer':''}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

// ─── STATS ───────────────────────────────────────────────────
function renderStats(){
  const y=new Date().getFullYear();
  const ly=state.logs.filter(l=>l.date?.startsWith(y)).length;
  const ov=state.plans.filter(p=>p.status==='overdue').length;
  const up=state.plans.filter(p=>(p.status||'planned')==='planned').length;

  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-value">${state.logs.length}</div><div class="stat-label">Wszystkich nawożeń</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green-light)">${ly}</div><div class="stat-label">W tym roku</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--amber)">${up}</div><div class="stat-label">Zaplanowanych</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--red)">${ov}</div><div class="stat-label">Zaległych</div></div>`;

  const mc=Array(12).fill(0);
  state.logs.filter(l=>l.date?.startsWith(y)).forEach(l=>mc[+l.date.split('-')[1]-1]++);
  const mx=Math.max(...mc,1);
  document.getElementById('monthBars').innerHTML=
    mc.map(c=>`<div class="month-bar-wrap"><div class="month-bar" style="height:${Math.max(4,(c/mx)*80)}px;opacity:${c?1:0.2}"></div></div>`).join('');
  document.getElementById('monthLabels').innerHTML=
    ['Sty','Lut','Mar','Kwi','Maj','Cze','Lip','Sie','Wrz','Paź','Lis','Gru'].map(n=>
      `<div style="flex:1;text-align:center;font-size:9px;color:var(--text-muted);font-weight:700">${n}</div>`).join('');

  const fc={};
  state.logs.forEach(l=>{if(l.fert)fc[l.fert]=(fc[l.fert]||0)+1;});
  const sorted=Object.entries(fc).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const mf=sorted[0]?.[1]||1;
  document.getElementById('fertChart').innerHTML=sorted.length
    ?sorted.map(([n,c])=>`<div class="bar-row"><div class="bar-label">${esc(n)}</div><div class="bar-track"><div class="bar-fill" style="width:${(c/mf)*100}%"></div></div><div class="bar-count">${c}</div></div>`).join('')
    :`<div class="empty-state" style="padding:20px"><div class="empty-icon">🌿</div><div class="empty-text">Brak danych</div></div>`;
}
</script>
</body>
</html>
